server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve the SPA; fall back to index.html for client-side routing.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy all API calls to the backend container on the compose network.
    # /api/hello -> backend /api/hello, /api/summary -> backend /api/summary.
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # /api/chat streams Server-Sent Events. nginx buffers proxied
        # responses by default, which holds the whole body until the
        # backend finishes (or a timeout kills the connection early —
        # the local Ollama path can run well past nginx's 60s default,
        # which is what produced ERR_INCOMPLETE_CHUNKED_ENCODING in the
        # browser). Disable buffering and extend the timeouts so chunks
        # reach the client as the pipeline emits them.
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
