# =============================================================================
# Shipment Dashboard — Phase 1 full stack
#   db       : PostgreSQL 16 (schema + views auto-created on first boot)
#   seeder   : one-shot Python job that loads the scenario-based dataset
#   backend  : FastAPI API (Python)
#   frontend : React (Vite) hello-world served by nginx, proxies /api -> backend
#
# Quick start on a fresh machine:
#   docker compose up --build
# Then open http://localhost:3000
# =============================================================================

services:
  db:
    image: postgres:16-alpine
    container_name: shipment_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-shipdb_phase1}
      AGENT_DB_PASSWORD: ${AGENT_DB_PASSWORD:-agent_ro_pw}
    # Schema (01) + dashboard views (02) + read-only agent role (03) run
    # automatically, in filename order, the first time the data volume is empty.
    volumes:
      - ./db/init:/docker-entrypoint-initdb.d:ro
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-shipdb_phase1}"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  seeder:
    build: ./seeder
    container_name: shipment_seeder
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-shipdb_phase1}
      SEED_SHIPMENTS: ${SEED_SHIPMENTS:-25000}
      SEED_CUSTOMERS: ${SEED_CUSTOMERS:-800}
      SEED_RANDOM_SEED: ${SEED_RANDOM_SEED:-42}
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  backend:
    build: ./backend
    container_name: shipment_backend
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-shipdb_phase1}
      # Read-only role for the AI chat agent — see AGENTIC_RAG_ARCHITECTURE.md §4 Stage 5/6.
      AGENT_DATABASE_URL: postgresql://agent_ro:${AGENT_DB_PASSWORD:-agent_ro_pw}@db:5432/${POSTGRES_DB:-shipdb_phase1}
      # v1 only (Stage 4b LLM SQL draft, Stage 7 v1 synthesis) — optional. Unset
      # means those stages degrade gracefully to v0's clarifying/template answers.
      # Provider switch — "anthropic" (cloud, needs a key + credit) or "ollama"
      # (local model, needs `ollama pull <model>` on the host already done) —
      # both implement the same call_tool() contract, see llm_client.py.
      AGENT_LLM_PROVIDER: ${AGENT_LLM_PROVIDER:-anthropic}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      AGENT_LLM_MODEL: ${AGENT_LLM_MODEL:-claude-haiku-4-5-20251001}
      AGENT_OLLAMA_MODEL: ${AGENT_OLLAMA_MODEL:-llama3.1}
      # host.docker.internal resolves to the host machine from inside the
      # container — Ollama runs on the host, not in this Compose stack.
      AGENT_OLLAMA_HOST: ${AGENT_OLLAMA_HOST:-http://host.docker.internal:11434}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # Single source of truth for the agent's schema knowledge — mounted
      # read-only rather than copied at build time, so it can be edited
      # without rebuilding the backend image (see 02_phase1_agentic_schema.json).
      - ./02_phase1_agentic_schema.json:/app/schema/02_phase1_agentic_schema.json:ro
      # Persists the sentence-transformers model download across container
      # restarts / rebuilds so it isn't re-fetched from HuggingFace every time.
      - hf_cache:/root/.cache/huggingface
    extra_hosts:
      # host.docker.internal is automatic on Docker Desktop (Win/Mac) but
      # needs this explicit mapping on native Linux Docker to reach Ollama.
      - "host.docker.internal:host-gateway"
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_GOOGLE_MAPS_API_KEY: ${VITE_GOOGLE_MAPS_API_KEY:-}
    container_name: shipment_frontend
    depends_on:
      - backend
    ports:
      - "3000:80"
    restart: unless-stopped

volumes:
  pgdata:
  hf_cache:
